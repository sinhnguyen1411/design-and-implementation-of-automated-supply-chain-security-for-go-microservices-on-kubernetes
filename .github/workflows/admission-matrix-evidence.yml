name: admission-lab

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: admission-lab
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - name: Set up kind
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: thesis-evidence
          wait: 180s

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run admission matrix demo script
        shell: pwsh
        run: |
          ./infra/scripts/admission_matrix_demo.ps1 `
            -Context "kind-thesis-evidence" `
            -Namespace "stock-trading" `
            -ExportDir "demo/evidence" `
            -ResetNamespace

      - name: Resolve latest matrix run path
        id: run_dir
        shell: pwsh
        run: |
          $runDir = Get-ChildItem demo/evidence -Directory `
            | Where-Object { $_.Name -match '^[0-9]{8}-[0-9]{6}$' } `
            | Sort-Object Name -Descending `
            | Select-Object -First 1
          if (-not $runDir) {
            throw "No matrix run directory found under demo/evidence/"
          }
          "path=$($runDir.FullName)" >> $env:GITHUB_OUTPUT
          "id=$($runDir.Name)" >> $env:GITHUB_OUTPUT

      - name: Write evidence metadata schema payload
        shell: pwsh
        run: |
          $createdAt = (Get-Date).ToUniversalTime().ToString("o")
          $meta = [ordered]@{
            workflow_key = "admission-lab"
            service_name = "user-service"
            scenario = "canonical-matrix"
            runner_os = "ubuntu-latest"
            run_id = "${{ steps.run_dir.outputs.id }}"
            sha = "${{ github.sha }}"
            verdict = "generated"
            evidence_paths = @(
              "${{ steps.run_dir.outputs.path }}/matrix-index.json",
              "${{ steps.run_dir.outputs.path }}/matrix-summary.md",
              "${{ steps.run_dir.outputs.path }}/regression-valid-allow.json"
            )
          }
          $meta | ConvertTo-Json -Depth 8 | Set-Content -Path "${{ steps.run_dir.outputs.path }}/evidence-metadata.json" -Encoding UTF8

      - name: Upload admission matrix evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: admission-lab-evidence
          path: |
            ${{ steps.run_dir.outputs.path }}/matrix-index.json
            ${{ steps.run_dir.outputs.path }}/matrix-summary.md
            ${{ steps.run_dir.outputs.path }}/regression-valid-allow.json
            ${{ steps.run_dir.outputs.path }}/evidence-metadata.json
            ${{ steps.run_dir.outputs.path }}/VALID_ALLOW
            ${{ steps.run_dir.outputs.path }}/NEG_UNSIGNED_DENY
            ${{ steps.run_dir.outputs.path }}/NEG_MISSING_SBOM_DENY
            ${{ steps.run_dir.outputs.path }}/NEG_CVE_THRESHOLD_DENY
            ${{ steps.run_dir.outputs.path }}/NEG_WRONG_KEY_DENY
            ${{ steps.run_dir.outputs.path }}/NEG_MISSING_PROVENANCE_DENY
            ${{ steps.run_dir.outputs.path }}/VALID_ALLOW_RECHECK
          if-no-files-found: error

