name: ci-service

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'services.yaml'
      - '.github/workflows/ci-service.yml'
      - '.github/workflows/reusable-go-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'services.yaml'
      - '.github/workflows/ci-service.yml'
      - '.github/workflows/reusable-go-verify.yml'
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to run (blank = changed only, 'all' = all services)"
        required: false
        default: ""
      mode:
        description: "Execution mode: normal or benchmark"
        type: choice
        options:
          - normal
          - benchmark
        required: false
        default: "normal"
      gate_mode:
        description: "Security gate mode: enforced or warn"
        type: choice
        options:
          - enforced
          - warn
        required: false
        default: "enforced"
      runner_target:
        description: "Windows smoke runner target: auto | self-hosted | gh-hosted"
        type: choice
        options:
          - auto
          - self-hosted
          - gh-hosted
        required: false
        default: "auto"
      os_coverage:
        description: "OS coverage for verify: linux-only | full (linux+macos)"
        type: choice
        options:
          - linux-only
          - full
        required: false
        default: "linux-only"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      has_services: ${{ steps.matrix.outputs.has_services }}
      os_list: ${{ steps.matrix.outputs.os_list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build service matrix
        id: matrix
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          INPUT_OS_COVERAGE: ${{ inputs.os_coverage || '' }}
        run: |
          import json, os, subprocess, yaml
          with open('services.yaml', 'r', encoding='utf-8') as f:
              services = yaml.safe_load(f)['services']

          event = os.environ.get('EVENT_NAME', '')
          selected = []
          request = (os.environ.get('INPUT_SERVICE') or '').strip()

          if event == 'schedule':
              selected = services
          elif event == 'workflow_dispatch' and request == 'all':
              selected = services
          elif event == 'workflow_dispatch' and request:
              selected = [s for s in services if s['name'] == request]
          else:
              before = (os.environ.get('BEFORE_SHA') or '').strip()
              base = (os.environ.get('BASE_SHA') or '').strip()
              compare_ref = base or before or 'HEAD~1'
              out = subprocess.run(['git', 'diff', '--name-only', compare_ref, 'HEAD'], capture_output=True, text=True)
              changed = [x for x in out.stdout.splitlines() if x.strip()]
              infra_changed = any(p.startswith('.github/workflows/') or p == 'services.yaml' for p in changed)
              if infra_changed:
                  selected = services
              else:
                  for s in services:
                      prefix = s['path'].rstrip('/') + '/'
                      if any(c.startswith(prefix) for c in changed):
                          selected.append(s)

          result = {'include': selected}
          has_services = 'true' if selected else 'false'

          os_coverage = (os.environ.get('INPUT_OS_COVERAGE') or '').strip()
          if event == 'schedule' or os_coverage == 'full':
              os_list = ["ubuntu-latest", "macos-latest"]
          else:
              os_list = ["ubuntu-latest"]

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"result={json.dumps(result)}\n")
              f.write(f"has_services={has_services}\n")
              f.write(f"os_list={json.dumps(os_list)}\n")

  verify-cross-os:
    needs: discover
    if: needs.discover.outputs.has_services == 'true' && (inputs.mode || 'normal') != 'benchmark'
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        runner_os: ${{ fromJson(needs.discover.outputs.os_list) }}
        service: ${{ fromJson(needs.discover.outputs.matrix).include }}
    uses: ./.github/workflows/reusable-go-verify.yml
    with:
      service_name: ${{ matrix.service.name }}
      service_path: ${{ matrix.service.path }}
      go_version: ${{ matrix.service.go_version || '1.25.11' }}
      runner_os: ${{ matrix.runner_os }}

  windows-parity-smoke:
    needs: discover
    if: needs.discover.outputs.has_services == 'true' && (inputs.runner_target || 'auto') == 'self-hosted'
    runs-on: [self-hosted, Windows, X64, parity]
    continue-on-error: true
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
      - name: Report Windows toolchain
        shell: powershell
        run: |
          go version
          go env GOOS GOARCH GOROOT
          Write-Output "Windows runner parity smoke completed."

  windows-gh-hosted-smoke:
    needs: discover
    if: needs.discover.outputs.has_services == 'true' && (((inputs.mode || 'normal') == 'benchmark') || ((inputs.runner_target || 'auto') == 'gh-hosted') || ((inputs.runner_target || 'auto') == 'auto' && github.event_name == 'workflow_dispatch'))
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
      - name: Report Windows toolchain
        shell: powershell
        run: |
          go version
          go env GOOS GOARCH GOROOT
          Write-Output "GitHub-hosted Windows smoke completed."

  supply-chain-ubuntu:
    needs: discover
    if: needs.discover.outputs.has_services == 'true' && (inputs.mode || 'normal') != 'benchmark'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version || '1.25.11' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ matrix.image }}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: 'false'
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          load: true
          push: false
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=min,scope=${{ matrix.name }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.7
        with:
          image: ${{ steps.meta.outputs.image }}
          format: spdx-json
          output-file: ${{ matrix.path }}/sbom.spdx.json

      - name: Scan image with Grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ steps.meta.outputs.image }}
          output-format: json
          output-file: ${{ matrix.path }}/grype-report.json
          fail-build: false
          severity-cutoff: high

      - name: Normalize grype report path
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${{ matrix.path }}/grype-report.json" ]; then
            echo "grype-report.json already written by scan-action"
          elif [ -f "${GITHUB_WORKSPACE}/results.json" ]; then
            cp "${GITHUB_WORKSPACE}/results.json" "${{ matrix.path }}/grype-report.json"
          fi

      - name: Build security gate findings from grype report
        shell: python
        run: |
          import json
          from pathlib import Path

          report = Path("${{ matrix.path }}/grype-report.json")
          out = Path("${{ matrix.path }}/security-gate-findings.json")
          findings = []

          if report.exists():
              data = json.loads(report.read_text(encoding="utf-8"))
              for m in data.get("matches", []):
                  v = m.get("vulnerability", {}) or {}
                  a = m.get("artifact", {}) or {}
                  sev = str(v.get("severity", "")).lower()
                  fix = (v.get("fix", {}) or {})
                  state = str(fix.get("state", "unknown")).lower()
                  if sev not in ("high", "critical"):
                      continue
                  if state in ("wont-fix", "not-fixed", "unknown"):
                      continue
                  findings.append({
                      "cve": v.get("id", ""),
                      "severity": sev,
                      "package": a.get("name", ""),
                      "installed": a.get("version", ""),
                      "fix_state": state,
                      "fixed_versions": fix.get("versions", []) or [],
                  })
          out.write_text(json.dumps({"findings": findings}, indent=2), encoding="utf-8")

      - name: Enforce security gate
        shell: python
        env:
          GATE_MODE: ${{ inputs.gate_mode || 'enforced' }}
        run: |
          import json
          import os
          from pathlib import Path

          gate = Path("${{ matrix.path }}/security-gate-findings.json")
          findings = []
          gate_mode = (os.environ.get("GATE_MODE", "enforced") or "enforced").strip().lower()
          if gate_mode not in ("enforced", "warn"):
            gate_mode = "enforced"

          if gate.exists():
            payload = json.loads(gate.read_text(encoding="utf-8"))
            findings = payload if isinstance(payload, list) else payload.get("findings", [])
            if not isinstance(findings, list):
              findings = []

          if findings and gate_mode == "enforced":
            raise SystemExit("Security gate failed: fixable high/critical vulnerabilities detected.")
          if findings and gate_mode == "warn":
            print("Security gate warning mode: findings detected but pipeline not failed.")

      - name: Upload Grype report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-grype-report
          path: ${{ matrix.path }}/grype-report.json
          if-no-files-found: warn

      - name: Upload security gate findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-security-gate-findings
          path: ${{ matrix.path }}/security-gate-findings.json
          if-no-files-found: warn

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (auto-recover on permission_denied)
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          IMAGE_PATH: ${{ matrix.image }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          OUT=$(docker push "${IMAGE}" 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then exit 0; fi

          if echo "$OUT" | grep -q "permission_denied: write_package"; then
            echo ""
            echo "===== Auto-recovery triggered ====="
            echo "Permission denied on legacy GHCR package. Deleting + retrying..."
            ENCODED=$(echo -n "$IMAGE_PATH" | sed 's|/|%2F|g')
            DEL_HTTP=$(curl -sS -o /tmp/del-out -w "%{http_code}" -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/user/packages/container/$ENCODED")
            echo "DELETE response: HTTP $DEL_HTTP"
            cat /tmp/del-out 2>/dev/null || true
            if [ "$DEL_HTTP" = "204" ] || [ "$DEL_HTTP" = "404" ]; then
              sleep 5
              docker push "${IMAGE}"
              exit $?
            else
              echo "Could not delete package via API. Aborting."
              echo "Manual fix: https://github.com/users/${GITHUB_REPOSITORY_OWNER}/packages/container/${ENCODED}/settings -> Manage Actions access"
              exit 1
            fi
          fi
          exit $RC

      - name: Resolve image digest
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: digest
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "value=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image (keyless)
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.value }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM (SPDX)
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.value }}
          SBOM_PATH: ${{ matrix.path }}/sbom.spdx.json
        run: cosign attest --yes --predicate "${SBOM_PATH}" --type spdxjson "${IMAGE}@${DIGEST}"

      - name: Build SLSA provenance predicate
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat > "${{ matrix.path }}/provenance.json" <<EOF
          {
            "buildDefinition": {
              "buildType": "https://github.com/actions/runner/v2",
              "externalParameters": {
                "workflow": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/ci-service.yml",
                "ref": "${GITHUB_REF}",
                "sha": "${GITHUB_SHA}"
              }
            },
            "runDetails": {
              "builder": {
                "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              },
              "metadata": {
                "invocationId": "${GITHUB_RUN_ID}"
              }
            }
          }
          EOF

      - name: Attest SLSA provenance
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.value }}
          PROV_PATH: ${{ matrix.path }}/provenance.json
        run: cosign attest --yes --predicate "${PROV_PATH}" --type slsaprovenance1 "${IMAGE}@${DIGEST}"

      # --- SLSA Build L3 attestation (flagship: user-service only) ---
      # Save image + digest as artifact so a downstream job can pipe them
      # into the official slsa-github-generator reusable workflow.
      - name: Save user-service digest for SLSA L3 attestation
        if: matrix.name == 'user-service' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.value }}
        run: |
          mkdir -p /tmp/slsa-l3
          # Strip :tag from image, keep only the repository path
          echo "${IMAGE%%:*}" > /tmp/slsa-l3/image.txt
          echo "${DIGEST}" > /tmp/slsa-l3/digest.txt

      - name: Upload digest artifact for SLSA L3 job
        if: matrix.name == 'user-service' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: user-service-slsa-l3-digest
          path: /tmp/slsa-l3/
          retention-days: 1

  # Read user-service digest from artifact and expose as job output so the
  # slsa-github-generator reusable workflow (called below) can consume it.
  read-user-slsa-digest:
    needs: [discover, supply-chain-ubuntu]
    if: |
      always()
      && needs.discover.outputs.has_services == 'true'
      && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && needs.supply-chain-ubuntu.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      image: ${{ steps.read.outputs.image }}
      digest: ${{ steps.read.outputs.digest }}
      has_value: ${{ steps.read.outputs.has_value }}
    steps:
      - name: Download digest artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: user-service-slsa-l3-digest
          path: /tmp/slsa-l3
        continue-on-error: true
      - name: Read image + digest
        id: read
        shell: bash
        run: |
          if [[ -f /tmp/slsa-l3/digest.txt && -f /tmp/slsa-l3/image.txt ]]; then
            IMAGE="$(cat /tmp/slsa-l3/image.txt | tr -d '[:space:]')"
            DIGEST="$(cat /tmp/slsa-l3/digest.txt | tr -d '[:space:]')"
            if [[ -n "${IMAGE}" && -n "${DIGEST}" ]]; then
              echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
              echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
              echo "has_value=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "has_value=false" >> "$GITHUB_OUTPUT"

  # Official SLSA Build L3 attestation for user-service (flagship).
  # Uses the OpenSSF reusable workflow which generates provenance inside an
  # isolated builder job that the caller cannot tamper with -- this is the
  # core property that distinguishes L3 from the custom L1+ attestation
  # produced by `supply-chain-ubuntu` for all 23 services.
  provenance-l3-user-service:
    needs: [read-user-slsa-digest]
    if: needs.read-user-slsa-digest.outputs.has_value == 'true'
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.read-user-slsa-digest.outputs.image }}
      digest: ${{ needs.read-user-slsa-digest.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # Official SLSA Build L3 verification using slsa-framework/slsa-verifier.
  # This is the canonical OpenSSF tool that produces a PASS/FAIL verdict
  # against the SLSA v1.0 specification. The output is uploaded as evidence
  # so the thesis can cite a tool-verified compliance claim (not just
  # human-eyeballed Rekor entries).
  verify-slsa-l3-user-service:
    needs: [read-user-slsa-digest, provenance-l3-user-service]
    if: |
      always()
      && needs.read-user-slsa-digest.outputs.has_value == 'true'
      && needs.provenance-l3-user-service.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR (needed to fetch attestation manifest)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@v2.6.0

      - name: Verify SLSA L3 attestation via slsa-verifier
        id: verify
        env:
          IMAGE: ${{ needs.read-user-slsa-digest.outputs.image }}
          DIGEST: ${{ needs.read-user-slsa-digest.outputs.digest }}
        run: |
          mkdir -p /tmp/slsa-verify
          echo "Verifying ${IMAGE}@${DIGEST} ..."
          set -o pipefail
          slsa-verifier verify-image \
            "${IMAGE}@${DIGEST}" \
            --source-uri "github.com/${{ github.repository }}" \
            --builder-id "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml" \
            --print-provenance \
            2>&1 | tee /tmp/slsa-verify/output.txt

      - name: Render GitHub Step Summary (evidence for thesis)
        if: always()
        env:
          IMAGE: ${{ needs.read-user-slsa-digest.outputs.image }}
          DIGEST: ${{ needs.read-user-slsa-digest.outputs.digest }}
        run: |
          {
            echo "## SLSA L3 Official Verification"
            echo ""
            if [[ "${{ steps.verify.outcome }}" == "success" ]]; then
              echo "**Verdict: PASS**"
            else
              echo "**Verdict: FAIL**"
            fi
            echo ""
            echo "- Tool: \`slsa-framework/slsa-verifier@v2.6.0\` (official OpenSSF)"
            echo "- Image: \`${IMAGE}@${DIGEST}\`"
            echo "- Trusted builder: \`slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0\`"
            echo "- Spec: SLSA v1.0 Build Track L3"
            echo ""
            echo '<details><summary>Full slsa-verifier output</summary>'
            echo ""
            echo '```'
            cat /tmp/slsa-verify/output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slsa-l3-verifier-evidence
          path: /tmp/slsa-verify/
          retention-days: 90

  push-unsigned-canary:
    needs: [discover, supply-chain-ubuntu]
    if: always() && needs.discover.outputs.has_services == 'true' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.supply-chain-ubuntu.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push unsigned canary image (NOT signed)
        env:
          DOCKER_BUILD_SUMMARY: 'false'
        run: |
          # A tiny placeholder image used by onboarding-lab to exercise the
          # NEG_UNSIGNED_DENY scenario across all 23 services. Pushed without
          # cosign sign / attest so Kyverno verify-images denies it.
          mkdir -p ctx
          cat > ctx/Dockerfile <<'EOF'
          FROM gcr.io/distroless/static:nonroot
          CMD ["/canary"]
          EOF
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ${{ env.REGISTRY }}/sinhnguyen1411/stock-trading/unsigned-canary:latest \
            ctx

  ci-summary:
    needs: [discover, verify-cross-os, supply-chain-ubuntu]
    if: always() && needs.discover.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    steps:
      - name: Download all security gate findings
        uses: actions/download-artifact@v4
        with:
          pattern: '*-security-gate-findings'
          path: findings/
          merge-multiple: false
        continue-on-error: true

      - name: Write consolidated pipeline summary
        shell: python
        env:
          MATRIX_JSON: ${{ needs.discover.outputs.matrix }}
          VERIFY_RESULT: ${{ needs.verify-cross-os.result }}
          SUPPLY_RESULT: ${{ needs.supply-chain-ubuntu.result }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone

          matrix   = json.loads(os.environ.get('MATRIX_JSON', '{"include":[]}'))
          services = matrix.get('include', [])
          n        = len(services)
          verify   = os.environ.get('VERIFY_RESULT', 'skipped')
          supply   = os.environ.get('SUPPLY_RESULT', 'skipped')

          def status(r):
              return {'success': 'pass', 'failure': 'fail', 'cancelled': 'cancelled'}.get(r, 'skip')

          overall_ok = verify == 'success' and supply == 'success'
          overall    = 'PASS' if overall_ok else 'FAIL'

          run_url   = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          sha_short = os.environ.get('GITHUB_SHA', '')[:7]
          ref       = os.environ.get('GITHUB_REF_NAME', '')
          event     = os.environ.get('GITHUB_EVENT_NAME', '')
          now       = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          # Aggregate per-service findings from downloaded artifacts
          findings_dir = Path('findings')
          svc_data = {}
          for svc in services:
              name  = svc['name']
              fpath = findings_dir / f"{name}-security-gate-findings" / "security-gate-findings.json"
              if fpath.exists():
                  try:
                      payload = json.loads(fpath.read_text(encoding='utf-8'))
                      items   = payload if isinstance(payload, list) else payload.get('findings', [])
                      svc_data[name] = items if isinstance(items, list) else []
                  except Exception:
                      svc_data[name] = None
              else:
                  svc_data[name] = None

          total_cves = sum(len(v) for v in svc_data.values() if v is not None)
          flagged    = [(k, v) for k, v in svc_data.items() if v]

          lines = [
              f"## {overall} — CI Pipeline · {n}/{n} services",
              "",
              f"| Job | Result | Coverage |",
              f"|-----|--------|----------|",
              f"| `verify-cross-os` (tests · govulncheck) | {status(verify)} | {n}/{n} |",
              f"| `supply-chain-ubuntu` (Docker · SBOM · Grype CVE) | {status(supply)} | {n}/{n} |",
              "",
              "---",
              "",
              f"### Security Gate — {total_cves} fixable high/critical CVEs across {n} services",
              "",
          ]

          if flagged:
              lines += [
                  "| Service | CVE | Severity | Package | Fixed Versions |",
                  "|---------|-----|----------|---------|----------------|",
              ]
              for svc_name, items in flagged:
                  for item in items:
                      cve   = str(item.get('cve', '-')).replace('|', '\\|')
                      sev   = str(item.get('severity', '-')).replace('|', '\\|')
                      pkg   = str(item.get('package', '-')).replace('|', '\\|')
                      fxv   = item.get('fixed_versions', [])
                      fixed = ', '.join(str(v) for v in fxv) if fxv else '-'
                      lines.append(f"| `{svc_name}` | {cve} | {sev} | {pkg} | {fixed} |")
          else:
              lines += [
                  "| Service | Gate | CVEs |",
                  "|---------|------|------|",
              ]
              for svc in services:
                  name = svc['name']
                  d    = svc_data.get(name)
                  gate = 'no data' if d is None else 'pass'
                  count = '?' if d is None else str(len(d))
                  lines.append(f"| `{name}` | {gate} | {count} |")

          lines += [
              "",
              "---",
              "",
              f"| | |",
              f"|---|---|",
              f"| Ref | `{ref}` ({event}) |",
              f"| Commit | [{sha_short}]({run_url}) |",
              f"| Timestamp | {now} |",
          ]

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))
