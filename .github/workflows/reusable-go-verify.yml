name: reusable-go-verify

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      go_version:
        required: true
        type: string
      runner_os:
        required: true
        type: string

jobs:
  verify:
    runs-on: ${{ inputs.runner_os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: r

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: r/${{ inputs.service_path }}/go.sum

      - name: Dependency integrity checks
        shell: bash
        working-directory: r/${{ inputs.service_path }}
        run: |
          set -euo pipefail
          go mod download
          go mod verify
          go list -deps -mod=readonly ./... >/dev/null
          go mod tidy -diff | tee dependency-drift.diff || true

      - name: Unit tests
        shell: bash
        working-directory: r/${{ inputs.service_path }}
        run: go test ./...

      - name: Install govulncheck
        shell: bash
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        shell: bash
        working-directory: r/${{ inputs.service_path }}
        run: govulncheck ./... | tee govulncheck-report.txt

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.service_name }}-${{ inputs.runner_os }}-verify
          path: |
            r/${{ inputs.service_path }}/dependency-drift.diff
            r/${{ inputs.service_path }}/govulncheck-report.txt
          if-no-files-found: warn
