name: secure-supply-chain

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'services.yaml'
      - '.github/workflows/secure-supply-chain.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'services.yaml'
      - '.github/workflows/secure-supply-chain.yml'
  workflow_dispatch:
    inputs:
      security_gate_mode:
        description: "Security gate mode: enforced (hard fail) or advisory (warn only)"
        required: false
        default: "enforced"
      service:
        description: "Service to build (blank = changed only, 'all' = everything)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  GOVULNCHECK_VERSION: "v1.1.4"
  SECURITY_GATE: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Discover which services need building from services.yaml
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      has_services: ${{ steps.matrix.outputs.has_services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build service matrix from registry
        id: matrix
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          import yaml, json, subprocess, os

          with open("services.yaml") as f:
              config = yaml.safe_load(f)

          services = config["services"]
          event = os.environ["EVENT_NAME"]
          input_service = os.environ.get("INPUT_SERVICE", "").strip()

          if event == "workflow_dispatch" and input_service == "all":
              selected = services
          elif event == "workflow_dispatch" and input_service:
              selected = [s for s in services if s["name"] == input_service]
          else:
              before = os.environ.get("BEFORE_SHA", "").strip()
              base = os.environ.get("BASE_SHA", "").strip()
              compare_ref = base or before or "HEAD~1"

              result = subprocess.run(
                  ["git", "diff", "--name-only", compare_ref, "HEAD"],
                  capture_output=True, text=True
              )
              changed = [f for f in result.stdout.strip().split("\n") if f]

              infra_changed = any(
                  f.startswith(".github/workflows/") or f == "services.yaml"
                  for f in changed
              )

              if infra_changed:
                  selected = services
              else:
                  selected = [
                      s for s in services
                      if any(f.startswith(s["path"] + "/") for f in changed)
                  ]

          matrix = {"include": selected} if selected else {"include": []}
          has = "true" if selected else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"result={json.dumps(matrix)}\n")
              out.write(f"has_services={has}\n")

          print(f"Selected {len(selected)} service(s): {[s['name'] for s in selected]}")

  # ---------------------------------------------------------------------------
  # 2. Build, scan, sign, and verify each selected service
  # ---------------------------------------------------------------------------
  build-sign-verify:
    needs: discover
    if: needs.discover.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    env:
      IMAGE_NAME: ${{ matrix.image }}
      GO_VERSION: ${{ matrix.go_version || '1.25.9' }}
      SERVICE_PATH: ${{ matrix.path }}
      SERVICE_NAME: ${{ matrix.name }}
      GOVULNCHECK_REPORT: govulncheck-report.txt
      DEPENDENCY_INTEGRITY_REPORT: dependency-integrity-report.txt
      SBOM_PATH: sbom.spdx.json
      SCAN_REPORT: grype-report.json
      SECURITY_GATE_FINDINGS_JSON: security-gate-findings.json
      SECURITY_GATE_FINDINGS_MD: security-gate-findings.md
      SECURITY_GATE_MODE: ${{ inputs.security_gate_mode || 'enforced' }}

    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Dependency integrity checks (Go modules) - fail fast
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          set -euo pipefail
          {
            echo "== go mod download =="
            go mod download
            echo
            echo "== go mod verify =="
            go mod verify
            echo
            echo "== go list -deps -mod=readonly ./... =="
            go list -deps -mod=readonly ./... >/dev/null
            echo "OK: readonly dependency graph resolved without go.mod/go.sum mutation."
            echo
            echo "== go mod tidy -diff (audit) =="
            if go mod tidy -diff; then
              echo "OK: no module drift detected by tidy diff."
            else
              echo "WARN: go mod tidy -diff reported drift. Treated as audit-only; see issue #14 follow-up."
            fi
          } 2>&1 | tee "${{ env.DEPENDENCY_INTEGRITY_REPORT }}"

      - name: Upload dependency integrity report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-dependency-integrity-report
          path: ${{ env.SERVICE_PATH }}/${{ env.DEPENDENCY_INTEGRITY_REPORT }}
          if-no-files-found: warn

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Go vulnerability scan (govulncheck) - fail fast
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          set -euo pipefail
          govulncheck ./... 2>&1 | tee "${{ env.GOVULNCHECK_REPORT }}"

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-govulncheck-report
          path: ${{ env.SERVICE_PATH }}/${{ env.GOVULNCHECK_REPORT }}
          if-no-files-found: warn

      - name: Derive metadata
        id: meta
        run: |
          TAG=${GITHUB_SHA::12}
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"
            IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            REGISTRY_MODE="local"
            REQUIRES_LOGIN="false"
          elif [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"
            IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            REGISTRY_MODE="ghcr"
            REQUIRES_LOGIN="true"
          else
            IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"
            IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            REGISTRY_MODE="local"
            REQUIRES_LOGIN="false"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "registry_mode=${REGISTRY_MODE}" >> "$GITHUB_OUTPUT"
          echo "requires_login=${REQUIRES_LOGIN}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Explain GHCR credential strategy
        run: |
          if [ "${{ steps.meta.outputs.registry_mode }}" = "ghcr" ]; then
            echo "Using GHCR_TOKEN/GHCR_USERNAME secrets for GHCR push."
          else
            echo "Registry publishing disabled for this run."
            echo "Workflow will still build, test, generate SBOM, and run vulnerability scanning."
          fi

      - name: Log in to GHCR
        if: ${{ steps.meta.outputs.requires_login == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          load: ${{ steps.meta.outputs.registry_mode == 'local' }}
          push: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
          tags: ${{ steps.meta.outputs.image }}

      - name: Resolve image digest reference
        id: image_ref
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        run: |
          IMAGE_DIGEST="${{ steps.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.17.7
        with:
          image: ${{ steps.meta.outputs.image }}
          output-file: ${{ env.SBOM_PATH }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Vulnerability scan (Grype)
        id: grype
        run: |
          grype sbom:${{ env.SBOM_PATH }} -o json > ${{ env.SCAN_REPORT }}

      - name: Compute annotation values (SBOM digest + fixable High/Critical count)
        id: annos
        run: |
          set -euo pipefail
          SBOM_DIGEST=$(sha256sum "${{ env.SBOM_PATH }}" | awk '{print $1}')
          HIGH_CRITICAL=$(jq '[.matches[]? | select((.vulnerability.severity? // "" | ascii_downcase) == "high" or (.vulnerability.severity? // "" | ascii_downcase) == "critical") | select(((.vulnerability.fix.state? // "unknown") | ascii_downcase) != "wont-fix") | select(((.vulnerability.fix.state? // "unknown") | ascii_downcase) != "not-fixed") | select(((.vulnerability.fix.state? // "unknown") | ascii_downcase) != "unknown")] | length' "${{ env.SCAN_REPORT }}" || echo "0")
          echo "sbom_digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "high_critical=${HIGH_CRITICAL}" >> "$GITHUB_OUTPUT"

      - name: Resolve security gate mode
        id: gate_mode
        run: |
          MODE="${{ env.SECURITY_GATE_MODE }}"
          MODE=$(echo "$MODE" | tr '[:upper:]' '[:lower:]')
          if [ "$MODE" != "enforced" ] && [ "$MODE" != "advisory" ]; then
            echo "::warning::Invalid SECURITY_GATE_MODE '$MODE'. Fallback to 'enforced'."
            MODE="enforced"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved security gate mode: $MODE"

      - name: Build security gate findings list (fixable high/critical CVEs)
        id: gate_findings
        run: |
          set -euo pipefail
          jq '[
            .matches[]?
            | {
                cve: .vulnerability.id,
                severity: ((.vulnerability.severity // "" ) | ascii_downcase),
                package: .artifact.name,
                installed: .artifact.version,
                fix_state: ((.vulnerability.fix.state // "unknown") | ascii_downcase),
                fixed_versions: (.vulnerability.fix.versions // [])
              }
            | select((.severity == "high" or .severity == "critical")
                and .fix_state != "wont-fix"
                and .fix_state != "not-fixed"
                and .fix_state != "unknown")
          ]' "${{ env.SCAN_REPORT }}" > "${{ env.SECURITY_GATE_FINDINGS_JSON }}"

          COUNT=$(jq 'length' "${{ env.SECURITY_GATE_FINDINGS_JSON }}")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

          {
            echo "# Security Gate Findings (${{ env.SERVICE_NAME }})"
            echo
            echo "- Gate mode: \`${{ steps.gate_mode.outputs.mode }}\`"
            echo "- Fixable high/critical count: \`${COUNT}\`"
            echo
            if [ "${COUNT}" -eq 0 ]; then
              echo "No fixable high/critical CVEs detected."
            else
              echo "| CVE | Severity | Package | Installed | Fix State | Fixed Versions |"
              echo "|---|---|---|---|---|---|"
              jq -r '.[] | "| \(.cve) | \(.severity) | \(.package) | \(.installed) | \(.fix_state) | \((.fixed_versions | join(", "))) |"' "${{ env.SECURITY_GATE_FINDINGS_JSON }}"
            fi
          } | tee "${{ env.SECURITY_GATE_FINDINGS_MD }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Security gate (hard-fail by default)
        if: ${{ env.SECURITY_GATE == 'true' }}
        run: |
          if [ "${{ steps.gate_findings.outputs.count }}" != "0" ]; then
            if [ "${{ steps.gate_mode.outputs.mode }}" = "advisory" ]; then
              echo "::warning::Security gate advisory mode enabled: fixable high/critical CVEs detected (${{ steps.gate_findings.outputs.count }})."
              echo "::warning::Use SECURITY_GATE_MODE=enforced to hard-fail this run."
            else
              echo "Security gate failed: fixable high/critical CVEs detected."
              exit 1
            fi
          else
            echo "Security gate passed: no fixable high/critical CVEs detected."
          fi

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-sbom
          path: ${{ env.SBOM_PATH }}
          if-no-files-found: ignore

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-grype-report
          path: ${{ env.SCAN_REPORT }}
          if-no-files-found: ignore

      - name: Upload security gate findings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-security-gate-findings
          path: |
            ${{ env.SECURITY_GATE_FINDINGS_JSON }}
            ${{ env.SECURITY_GATE_FINDINGS_MD }}
          if-no-files-found: ignore

      - name: Install Cosign
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image with keyless Cosign
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ steps.image_ref.outputs.image_digest }}

      - name: Generate SLSA-style provenance predicate
        id: provenance
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        run: |
          cat > provenance.json <<'EOF'
          {
            "buildType": "https://slsa.dev/provenance/v0.2",
            "builder": { "id": "github-actions" },
            "invocation": {
              "configSource": {
                "uri": "${{ github.repositoryUrl }}",
                "digest": { "gitCommit": "${GITHUB_SHA}" }
              }
            },
            "metadata": {
              "buildInvocationId": "${{ github.run_id }}",
              "completeness": { "parameters": true, "environment": true, "materials": true },
              "reproducible": false
            },
            "materials": [
              { "uri": "git+${{ github.repositoryUrl }}", "digest": { "sha1": "${GITHUB_SHA}" } }
            ]
          }
          EOF
          echo "predicate=provenance.json" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM to image
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attach sbom --sbom ${{ env.SBOM_PATH }} ${{ steps.image_ref.outputs.image_digest }}

      - name: Attest provenance
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate ${{ steps.provenance.outputs.predicate }} \
            --type slsaprovenance \
            ${{ steps.image_ref.outputs.image_digest }}

      - name: Render Kustomize annotations overlay (with scan/SBOM values)
        run: |
          set -euo pipefail
          mkdir -p ${{ env.SERVICE_PATH }}/deploy/kubernetes/overlays/ci
          cat > ${{ env.SERVICE_PATH }}/deploy/kubernetes/overlays/ci/patch-annotations.yaml <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ env.SERVICE_NAME }}
            namespace: stock-trading
          spec:
            template:
              metadata:
                annotations:
                  security.grype.io/high_critical: "${{ steps.annos.outputs.high_critical }}"
                  security.stock-trading.dev/sbom-digest: "${{ steps.annos.outputs.sbom_digest }}"
          EOF
          cat > ${{ env.SERVICE_PATH }}/deploy/kubernetes/overlays/ci/kustomization.yaml <<'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: stock-trading
          resources:
            - ../../base
          patches:
            - path: patch-annotations.yaml
          EOF

      - name: Verify signature in registry
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/secure-supply-chain.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.image_ref.outputs.image_digest }} | tee cosign-verify-signature.txt

      - name: Verify provenance attestation in registry
        if: ${{ steps.meta.outputs.registry_mode == 'ghcr' }}
        run: |
          set -euo pipefail
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/secure-supply-chain.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.image_ref.outputs.image_digest }} | tee cosign-verify-attestation.txt

      - name: Upload Cosign bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SERVICE_NAME }}-cosign-bundle
          path: |
            provenance.json
            ${{ env.SBOM_PATH }}
            ${{ env.SCAN_REPORT }}
            ${{ env.SECURITY_GATE_FINDINGS_JSON }}
            ${{ env.SECURITY_GATE_FINDINGS_MD }}
            cosign-verify-signature.txt
            cosign-verify-attestation.txt
            ${{ env.SERVICE_PATH }}/deploy/kubernetes/overlays/ci/patch-annotations.yaml
            ${{ env.SERVICE_PATH }}/deploy/kubernetes/overlays/ci/kustomization.yaml
          if-no-files-found: ignore
