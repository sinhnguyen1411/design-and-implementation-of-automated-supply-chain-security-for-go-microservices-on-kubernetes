apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: stock-trading
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stock-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: stock-trading
      annotations:
        kubectl.kubernetes.io/default-container: user-service
        security.grype.io/high_critical: "0"

        security.stock-trading.dev/matrix-case: "NEG_MISSING_SBOM_DENY"
    spec:
      serviceAccountName: user-service
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: user-service
          image: ttl.sh/stock-trading-matrix-signed-2369c9df4111@sha256:430529879d903a9514281956ea05030d56f82dcac8458751e57be0b410c2e8ef
          imagePullPolicy: Always
          args: ["server", "--config", "/etc/stock-trading/config/config.yaml"]
          env:
            - name: AUTH__ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: auth-access-token-secret
            - name: AUTH__REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: auth-refresh-token-secret
          ports:
            - name: http
              containerPort: 18080
            - name: grpc
              containerPort: 19090
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 18
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/stock-trading/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: user-service-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}
