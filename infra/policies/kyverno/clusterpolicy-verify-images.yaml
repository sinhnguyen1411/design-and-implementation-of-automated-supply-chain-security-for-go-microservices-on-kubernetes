apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-stock-trading-images
  annotations:
    policies.kyverno.io/title: Verify keyless signed and attested images
    policies.kyverno.io/category: DevSecOps
    policies.kyverno.io/subject: ImageSigning,Provenance
    policies.kyverno.io/description: >
      Enforce keyless Sigstore verification for all stock-trading service images signed
      in GitHub Actions, and require valid SLSA provenance attestations from the same
      workflow identity.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: verify-keyless-signature
      match:
        any:
          - resources:
              kinds: ["Pod"]
      verifyImages:
        - imageReferences:
            - "ghcr.io/sinhnguyen1411/stock-trading/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/sinhnguyen1411/design-and-implementation-of-automated-supply-chain-security-for-go-microservices-on-kubernetes/.github/workflows/secure-supply-chain.yml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
    - name: verify-keyless-slsa-attestation
      match:
        any:
          - resources:
              kinds: ["Pod"]
      verifyImages:
        - imageReferences:
            - "ghcr.io/sinhnguyen1411/stock-trading/*"
          attestations:
            - type: https://slsa.dev/provenance/v0.2
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/sinhnguyen1411/design-and-implementation-of-automated-supply-chain-security-for-go-microservices-on-kubernetes/.github/workflows/secure-supply-chain.yml@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
