piVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: stock-trading
  labels:
    app.kubernetes.io/name: audit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-service
      annotations:
        scs.gate/sbom-digest: ""
        scs.gate/critical-count: "0"
    spec:
      containers:
        - name: audit-service
          image: ghcr.io/sinhnguyen1411/stock-trading/audit-service
          ports:
            - containerPort: 8080