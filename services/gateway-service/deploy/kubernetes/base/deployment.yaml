apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: stock-trading
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: stock-trading
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: stock-trading
      annotations:
        kubectl.kubernetes.io/default-container: gateway-service
        # Intentionally empty in base; the CI overlay must populate both to pass admission.
        security.grype.io/high_critical: ""
        security.stock-trading.dev/sbom-digest: ""
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway-service
          image: ghcr.io/sinhnguyen1411/stock-trading/gateway-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 18
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
